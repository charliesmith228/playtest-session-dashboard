server {
    listen 80;

    # Serve the React build (static files)
    location / {
        root /var/www/ui;
        index index.html;

        # This is critical for React Router - if the file doesn't exist,
        # fall back to index.html so React can handle the route
        try_files $uri $uri/ index.html =404;
    }

    # Forward any /api/ requests to PHP-FPM
    location /api/ {
        # php-fpm is the service name defined in docker-compose.yml
        # Docker's internal DNS resolves service names automatically
        fastcgi_pass php-fpm:9000;

        fastcgi_index index.php;

        # Tell PHP-FPM where the files actually are on disk
        fastcgi_param SCRIPT_FILENAME /var/www/api/public/index.php;

        # Include standard FastCGI params (method, query string, etc.)
        include fastcgi_params;
    }
}